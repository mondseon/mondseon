name: update growing snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate growing snake SVGs
        run: node scripts/generate-growing-snake.js

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- assets/github-contribution-grid-snake-growing.svg assets/github-contribution-grid-snake-growing-dark.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated SVGs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake-growing.svg assets/github-contribution-grid-snake-growing-dark.svg
          git commit -m "chore: update growing snake [skip ci]"
          git push
